<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer></script>
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <h1>Tic Tac Toe</h1>
    <div class="welcome">
      <input
        type="text"
        class="welcome__player1"
        placeholder="Player 1 name..."
      />
      <input
        type="text"
        class="welcome__player2"
        placeholder="Player 2 name..."
      />
      <button class="welcome__startBrn">Start game</button>
    </div>
    <div class="container hide">
      <p class="currPlayerText"><span class="currPlayer"></span></p>
      <p class="result"></p>
      <div class="gameBtns">
        <button class="resetBtn">Again</button>
        <button class="newGameBtn">New game</button>
      </div>
      <div class="board">
        <div class="cell" data-row="0" data-col="0"></div>
        <div class="cell" data-row="0" data-col="1"></div>
        <div class="cell" data-row="0" data-col="2"></div>
        <div class="cell" data-row="1" data-col="0"></div>
        <div class="cell" data-row="1" data-col="1"></div>
        <div class="cell" data-row="1" data-col="2"></div>
        <div class="cell" data-row="2" data-col="0"></div>
        <div class="cell" data-row="2" data-col="1"></div>
        <div class="cell" data-row="2" data-col="2"></div>
      </div>
    </div>
  </body>
</html>
